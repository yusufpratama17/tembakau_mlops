name: PT SJT MLOps Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  run-mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code dari GitHub
      uses: actions/checkout@v3

    - name: Setup Python di Server GitHub
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Semua Library Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Eksekusi Latihan Model & Kirim ke DagsHub
      env:
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        python train.py